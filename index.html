<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OtterLife — Habit Otter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f8a8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OtterLife">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">

<style>
  :root{
    --teal:#1f8a8a; --teal-dark:#136b6b; --teal-light:#e0f2f1;
    --cream:#fdf6ec; --card:#ffffff; --ink:#2d2a26; --ink-soft:#7a736a;
    --brown:#8a5a3b; --gold:#e8a33d; --gold-soft:#fdeeD3;
    --green:#3fa06a; --red:#e06a5a; --sky1:#bfe8e6; --sky2:#e7f7f5;
    --shadow:0 6px 20px rgba(45,42,38,.08);
    --radius:20px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#d8efed 0%,#f3ece0 100%);
    display:flex;justify-content:center;align-items:flex-start;
    min-height:100vh;padding:18px 10px;color:var(--ink);
  }
  #app{
    width:100%;max-width:430px;background:var(--cream);
    border-radius:32px;box-shadow:0 18px 50px rgba(19,107,107,.18);
    overflow:hidden;display:flex;flex-direction:column;
    min-height:calc(100vh - 36px);max-height:940px;position:relative;
  }
  /* ---------- header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 10px;
  }
  .logo{font-weight:800;font-size:20px;color:var(--teal-dark);letter-spacing:-.3px}
  .logo span{color:var(--gold)}
  .pills{display:flex;gap:8px}
  .pill{
    background:var(--card);border-radius:999px;padding:6px 12px;
    font-weight:700;font-size:13px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:5px;
  }
  .pill.flame{color:#d05c2e}
  .pill.shell{color:var(--teal-dark)}
  /* ---------- main / views ---------- */
  main{flex:1;overflow-y:auto;padding:4px 16px 96px;scrollbar-width:none}
  main::-webkit-scrollbar{display:none}
  .view{display:none;animation:fadeIn .25s ease}
  .view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.section{font-size:15px;font-weight:800;color:var(--ink);margin:18px 4px 10px;display:flex;justify-content:space-between;align-items:baseline}
  h2.section small{font-weight:600;color:var(--ink-soft);font-size:12px}
  /* ---------- otter scene ---------- */
  .scene{
    background:linear-gradient(180deg,var(--sky2) 0%,var(--sky1) 62%,#8fd0cc 62%,#7cc5c1 100%);
    border-radius:var(--radius);box-shadow:var(--shadow);
    padding:10px 10px 0;position:relative;overflow:hidden;
  }
  .scene .name-tag{
    position:absolute;top:12px;left:14px;background:rgba(255,255,255,.75);
    border-radius:999px;padding:5px 12px;font-weight:800;font-size:13px;color:var(--teal-dark);
    cursor:pointer;
  }
  .scene .lvl-tag{
    position:absolute;top:12px;right:14px;background:rgba(255,255,255,.75);
    border-radius:999px;padding:5px 12px;font-weight:700;font-size:12px;color:var(--ink-soft);
  }
  .scene .speech{
    position:absolute;left:50%;transform:translateX(-50%);top:46px;
    background:#fff;border-radius:14px;padding:8px 14px;font-size:12.5px;font-weight:600;
    color:var(--ink);box-shadow:var(--shadow);max-width:82%;text-align:center;opacity:.95;
  }
  .otter-wrap{display:flex;justify-content:center;padding-top:70px}
  .otter-wrap svg{width:230px;height:auto;animation:bob 3.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .otter-wrap.celebrate svg{animation:hop .5s ease 3}
  @keyframes hop{0%,100%{transform:translateY(0)}40%{transform:translateY(-22px) rotate(-3deg)}}
  .eyes{animation:blink 4.6s infinite}
  @keyframes blink{0%,94%,100%{transform:scaleY(1)}96%,98%{transform:scaleY(.08)}}
  .eyes,.eyeL,.eyeR{transform-origin:center;transform-box:fill-box}
  .waves{position:absolute;bottom:-4px;left:0;width:100%}
  /* today ring */
  .today-card{
    display:flex;align-items:center;gap:14px;background:var(--card);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-top:14px;
  }
  .ring{position:relative;width:74px;height:74px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--teal-dark)}
  .today-card .info{flex:1}
  .today-card .info b{font-size:15px}
  .today-card .info p{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.45}
  /* ---------- habit cards ---------- */
  .habit{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px;margin-bottom:12px;
  }
  .habit .top{display:flex;align-items:center;gap:10px}
  .habit .emoji{
    width:42px;height:42px;border-radius:14px;background:var(--teal-light);
    display:flex;align-items:center;justify-content:center;font-size:21px;flex:none;
  }
  .habit.done .emoji{background:#dff3e7}
  .habit .meta{flex:1;min-width:0}
  .habit .meta b{font-size:14.5px}
  .habit .meta .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .habit .done-badge{font-size:12px;font-weight:800;color:var(--green);white-space:nowrap}
  .habit .bar{height:8px;background:#efe9df;border-radius:99px;margin-top:11px;overflow:hidden}
  .habit .bar i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .3s ease}
  .habit.done .bar i{background:var(--green)}
  .habit .controls{display:flex;gap:8px;margin-top:11px;align-items:center}
  button{font-family:inherit;border:none;cursor:pointer}
  .btn{
    background:var(--teal);color:#fff;font-weight:800;font-size:14px;
    border-radius:12px;padding:9px 14px;transition:transform .1s;
  }
  .btn:active{transform:scale(.94)}
  .btn.ghost{background:var(--teal-light);color:var(--teal-dark)}
  .btn.small{padding:7px 12px;font-size:13px}
  .btn.wide{flex:1}
  .btn:disabled{opacity:.45;cursor:default}
  input[type=range]{flex:1;accent-color:var(--teal)}
  input[type=number]{
    flex:1;border:2px solid #efe9df;border-radius:12px;padding:8px 10px;
    font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);width:100%;
    background:#fff;outline:none;
  }
  input[type=number]:focus{border-color:var(--teal)}
  .checkwrap{display:flex;align-items:center;gap:8px;margin-top:11px}
  /* ---------- stats ---------- */
  .stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
  .stat-card h3{font-size:13.5px;margin-bottom:2px;display:flex;justify-content:space-between}
  .stat-card h3 small{color:var(--ink-soft);font-weight:600}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .kpi{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px 8px;text-align:center}
  .kpi b{font-size:18px;display:block;color:var(--teal-dark)}
  .kpi span{font-size:11px;color:var(--ink-soft);font-weight:600}
  .insight{
    background:linear-gradient(135deg,#fdeed3,#fbf7ef);border-radius:var(--radius);
    padding:14px;font-size:13px;line-height:1.55;box-shadow:var(--shadow);margin-bottom:12px;
  }
  .insight b{color:#a06514}
  .settings-row{display:flex;gap:8px;margin:16px 0 8px}
  /* ---------- shop ---------- */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .item{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px;text-align:center;position:relative;
  }
  .item .big{font-size:34px}
  .item b{display:block;font-size:13.5px;margin-top:6px}
  .item .price{font-size:12px;color:var(--ink-soft);font-weight:700;margin:4px 0 10px}
  .item.owned .price{color:var(--green)}
  .item .equipped-dot{position:absolute;top:10px;right:10px;font-size:14px}
  /* ---------- nav ---------- */
  nav{
    position:absolute;bottom:0;left:0;width:100%;
    background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    display:flex;border-top:1px solid #eee5d8;padding:6px 8px calc(10px + env(safe-area-inset-bottom));
  }
  nav button{
    flex:1;background:none;font-family:inherit;padding:7px 0 4px;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:10.5px;font-weight:700;color:var(--ink-soft);border-radius:14px;
  }
  nav button .ico{font-size:20px;filter:grayscale(.9);opacity:.7;transition:.15s}
  nav button.active{color:var(--teal-dark)}
  nav button.active .ico{filter:none;opacity:1;transform:translateY(-2px)}
  /* ---------- toast / float ---------- */
  #toast{
    position:absolute;left:50%;transform:translateX(-50%);bottom:92px;
    background:var(--ink);color:#fff;font-size:13px;font-weight:700;
    padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;z-index:50;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .floater{
    position:absolute;font-weight:800;color:var(--gold);font-size:17px;z-index:40;
    pointer-events:none;animation:floatUp 1.1s ease forwards;text-shadow:0 1px 0 #fff;
  }
  @keyframes floatUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-56px)}}
  @media (max-width:460px){
    body{padding:0}
    #app{border-radius:0;max-height:none;min-height:100vh;box-shadow:none}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Otter<span>Life</span></div>
    <div class="pills">
      <div class="pill flame">🔥 <span id="streakNum">0</span></div>
      <div class="pill shell">🐚 <span id="shellNum">0</span></div>
    </div>
  </header>

  <main id="main">
    <!-- HOME -->
    <section class="view active" id="view-home">
      <div class="scene">
        <div class="name-tag" id="nameTag" title="Rename">🦦 Ollie</div>
        <div class="lvl-tag" id="lvlTag">Lv 1 · Pup</div>
        <div class="speech" id="speech">…</div>
        <div class="otter-wrap" id="otterWrap"></div>
        <svg class="waves" viewBox="0 0 430 30" preserveAspectRatio="none" height="30">
          <path d="M0 12 Q 36 2 72 12 T 144 12 T 216 12 T 288 12 T 360 12 T 432 12 V30 H0 Z" fill="#6ebbb6" opacity=".8"/>
          <path d="M0 20 Q 45 10 90 20 T 180 20 T 270 20 T 360 20 T 450 20 V30 H0 Z" fill="#59aca7"/>
        </svg>
      </div>

      <div class="today-card">
        <div class="ring" id="ringWrap"></div>
        <div class="info">
          <b id="todayHeadline">Today</b>
          <p id="todaySub"></p>
        </div>
      </div>

      <h2 class="section">Quick log <small>tap to add</small></h2>
      <div id="quickRow" style="display:flex;gap:10px;flex-wrap:wrap"></div>
    </section>

    <!-- TRACK -->
    <section class="view" id="view-track">
      <h2 class="section">Today's habits <small id="trackDate"></small></h2>
      <div id="habitList"></div>
    </section>

    <!-- STATS -->
    <section class="view" id="view-stats">
      <h2 class="section">This week</h2>
      <div class="kpis" id="kpis"></div>
      <div class="insight" id="insightBox"></div>
      <div id="charts"></div>
      <div class="settings-row">
        <button class="btn ghost wide" id="renameBtn">Rename otter</button>
        <button class="btn ghost wide" id="resetBtn" style="color:var(--red)">Reset all data</button>
      </div>
    </section>

    <!-- SHOP -->
    <section class="view" id="view-shop">
      <h2 class="section">Otter shop <small>earn 🐚 by completing habits</small></h2>
      <div class="shop-grid" id="shopGrid"></div>
    </section>
  </main>

  <nav id="nav">
    <button data-view="home" class="active"><span class="ico">🦦</span>Home</button>
    <button data-view="track"><span class="ico">✅</span>Track</button>
    <button data-view="stats"><span class="ico">📊</span>Stats</button>
    <button data-view="shop"><span class="ico">🛍️</span>Shop</button>
  </nav>

  <div id="toast"></div>
</div>

<script>
"use strict";
/* ================= config ================= */
const HABITS = [
  {id:"water",    name:"Water",         emoji:"💧", goal:8,    unit:"cups",  type:"counter", step:1,  max:20},
  {id:"sleep",    name:"Sleep",         emoji:"🛌", goal:7,    unit:"h",     type:"slider",  max:12,  stepSize:0.5},
  {id:"exercise", name:"Exercise",      emoji:"🏃", goal:30,   unit:"min",   type:"counter", step:10, max:600},
  {id:"steps",    name:"Steps",         emoji:"👣", goal:8000, unit:"steps", type:"input"},
  {id:"mindful",  name:"Mindful break", emoji:"🧘", goal:1,    unit:"",      type:"check"}
];
const SHOP = [
  {id:"bowtie", name:"Bow Tie",     emoji:"🎀", price:50},
  {id:"scarf",  name:"Cozy Scarf",  emoji:"🧣", price:60},
  {id:"hat",    name:"Straw Hat",   emoji:"👒", price:80},
  {id:"fish",   name:"Fish Friend", emoji:"🐟", price:90},
  {id:"shades", name:"Sunglasses",  emoji:"🕶️", price:100},
  {id:"ring",   name:"Swim Ring",   emoji:"🛟", price:120},
  {id:"phones", name:"Headphones",  emoji:"🎧", price:150},
  {id:"crown",  name:"Crown",       emoji:"👑", price:200}
];
const LEVELS = [
  {xp:0,    title:"Pup"},
  {xp:150,  title:"River Rookie"},
  {xp:400,  title:"Stream Scout"},
  {xp:800,  title:"Kelp Keeper"},
  {xp:1400, title:"Tide Master"},
  {xp:2200, title:"Otter Legend"}
];
const REWARD_PER_GOAL = 10, DAILY_BONUS = 20, STREAK_MIN_GOALS = 3;

/* ================= storage ================= */
let memStore = null;
function loadState(){
  try{ const raw = localStorage.getItem("otterlife"); if(raw) return JSON.parse(raw); }
  catch(e){ if(memStore) return memStore; }
  return null;
}
function save(){
  try{ localStorage.setItem("otterlife", JSON.stringify(state)); }
  catch(e){ memStore = state; }
}

/* ================= state ================= */
function dateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+dd;
}
function todayKey(){ return dateKey(new Date()); }
function blankDay(){
  return {water:0, sleep:0, exercise:0, steps:0, mindful:0, rewarded:{}};
}
function seedDemo(st){
  // light plausible history so stats aren't empty on first open
  const demos = [
    {water:6, sleep:6.5, exercise:20, steps:6400, mindful:0},
    {water:8, sleep:7.5, exercise:35, steps:9100, mindful:1},
    {water:5, sleep:6,   exercise:0,  steps:4200, mindful:0},
    {water:7, sleep:7,   exercise:40, steps:8600, mindful:1},
    {water:8, sleep:8,   exercise:30, steps:10200,mindful:1},
    {water:4, sleep:5.5, exercise:15, steps:5100, mindful:0}
  ];
  for(let i=6;i>=1;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    st.days[dateKey(d)] = Object.assign(blankDay(), demos[6-i], {demo:true});
  }
}
function defaultState(){
  const st = {shells:80, xp:0, otterName:"Ollie", inventory:[], equipped:[], days:{}};
  seedDemo(st);
  return st;
}
let state = loadState() || defaultState();

function today(){
  const k = todayKey();
  if(!state.days[k]) { state.days[k] = blankDay(); save(); }
  return state.days[k];
}
function goalMet(day, h){ return (day[h.id]||0) >= h.goal; }
function goalsMetCount(day){ return HABITS.filter(h=>goalMet(day,h)).length; }
function completionPct(day){
  let s=0;
  for(const h of HABITS) s += Math.min(1,(day[h.id]||0)/h.goal);
  return Math.round(100*s/HABITS.length);
}
function levelInfo(){
  let lvl=1, title=LEVELS[0].title, next=null;
  for(let i=0;i<LEVELS.length;i++){
    if(state.xp>=LEVELS[i].xp){ lvl=i+1; title=LEVELS[i].title; next=LEVELS[i+1]||null; }
  }
  return {lvl, title, next};
}
function streak(){
  // consecutive days (ending today, or yesterday if today not yet active) with >= STREAK_MIN_GOALS goals
  let n=0;
  const d = new Date();
  const todayActive = goalsMetCount(today()) >= STREAK_MIN_GOALS;
  if(!todayActive) d.setDate(d.getDate()-1);
  while(true){
    const day = state.days[dateKey(d)];
    if(day && goalsMetCount(day) >= STREAK_MIN_GOALS){ n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}

/* ================= rewards ================= */
function checkRewards(){
  const day = today();
  let earned = 0, celebrated = false;
  for(const h of HABITS){
    if(goalMet(day,h) && !day.rewarded[h.id]){
      day.rewarded[h.id] = true;
      earned += REWARD_PER_GOAL;
      toast(h.emoji+" "+h.name+" goal hit! +"+REWARD_PER_GOAL+" 🐚");
      celebrated = true;
    }
  }
  if(goalsMetCount(day)===HABITS.length && !day.rewarded.bonus){
    day.rewarded.bonus = true;
    earned += DAILY_BONUS;
    toast("🌟 Perfect day! Bonus +"+DAILY_BONUS+" 🐚");
    celebrated = true;
  }
  if(earned>0){
    state.shells += earned; state.xp += earned;
    floatShells("+"+earned+" 🐚");
  }
  if(celebrated) celebrate();
  save();
}

/* ================= otter svg ================= */
function otterSVG(){
  const eq = id => state.equipped.includes(id);
  const day = today();
  const pct = completionPct(day);
  // mood: mouth + eyes
  let mouth, cheeks=0.55;
  if(pct>=80) mouth = '<path d="M104 122 Q120 138 136 122" stroke="#3b2a1e" stroke-width="4" fill="none" stroke-linecap="round"/>';
  else if(pct>=35) mouth = '<path d="M108 126 Q120 133 132 126" stroke="#3b2a1e" stroke-width="4" fill="none" stroke-linecap="round"/>';
  else { mouth = '<path d="M110 129 Q120 126 130 129" stroke="#3b2a1e" stroke-width="4" fill="none" stroke-linecap="round"/>'; cheeks=0.3; }
  return `
  <svg viewBox="0 0 240 268" xmlns="http://www.w3.org/2000/svg">
    <!-- swim ring behind body -->
    ${eq("ring") ? '<ellipse cx="120" cy="196" rx="78" ry="30" fill="none" stroke="#e06a5a" stroke-width="17"/><ellipse cx="120" cy="196" rx="78" ry="30" fill="none" stroke="#fff" stroke-width="17" stroke-dasharray="24 34"/>' : ''}
    <!-- tail -->
    <ellipse cx="188" cy="228" rx="34" ry="14" fill="#734a2f" transform="rotate(-24 188 228)"/>
    <!-- body -->
    <ellipse cx="120" cy="192" rx="54" ry="60" fill="#8a5a3b"/>
    <ellipse cx="120" cy="202" rx="35" ry="45" fill="#d9b98c"/>
    <!-- feet -->
    <ellipse cx="92" cy="248" rx="16" ry="9" fill="#734a2f"/>
    <ellipse cx="148" cy="248" rx="16" ry="9" fill="#734a2f"/>
    <!-- arms + shell -->
    <ellipse cx="84" cy="188" rx="13" ry="24" fill="#734a2f" transform="rotate(24 84 188)"/>
    <ellipse cx="156" cy="188" rx="13" ry="24" fill="#734a2f" transform="rotate(-24 156 188)"/>
    <text x="120" y="188" font-size="24" text-anchor="middle">🐚</text>
    <!-- head -->
    <circle cx="72" cy="52" r="11" fill="#734a2f"/>
    <circle cx="168" cy="52" r="11" fill="#734a2f"/>
    <circle cx="72" cy="52" r="5" fill="#a5714b"/>
    <circle cx="168" cy="52" r="5" fill="#a5714b"/>
    <circle cx="120" cy="90" r="54" fill="#8a5a3b"/>
    <ellipse cx="120" cy="110" rx="32" ry="25" fill="#d9b98c"/>
    <ellipse cx="97" cy="118" rx="8" ry="5" fill="#e8a0a0" opacity="${cheeks}"/>
    <ellipse cx="143" cy="118" rx="8" ry="5" fill="#e8a0a0" opacity="${cheeks}"/>
    <g class="eyes">
      <circle class="eyeL" cx="99" cy="84" r="6.5" fill="#2d2118"/>
      <circle class="eyeR" cx="141" cy="84" r="6.5" fill="#2d2118"/>
      <circle cx="101" cy="82" r="2" fill="#fff"/>
      <circle cx="143" cy="82" r="2" fill="#fff"/>
    </g>
    <ellipse cx="120" cy="102" rx="9" ry="7" fill="#3b2a1e"/>
    ${mouth}
    <g stroke="#6b5138" stroke-width="1.6" opacity=".7">
      <line x1="78" y1="102" x2="52" y2="97"/><line x1="78" y1="108" x2="52" y2="110"/>
      <line x1="162" y1="102" x2="188" y2="97"/><line x1="162" y1="108" x2="188" y2="110"/>
    </g>
    <!-- accessories -->
    ${eq("shades") ? '<g><rect x="86" y="74" width="27" height="18" rx="7" fill="#23211e"/><rect x="127" y="74" width="27" height="18" rx="7" fill="#23211e"/><rect x="112" y="79" width="16" height="4" rx="2" fill="#23211e"/></g>' : ''}
    ${eq("scarf") ? '<g><path d="M78 140 Q120 162 162 140 L158 156 Q120 176 82 156 Z" fill="#d64545"/><rect x="128" y="150" width="16" height="34" rx="7" fill="#d64545"/><rect x="128" y="176" width="16" height="8" rx="3" fill="#b53434"/></g>' : ''}
    ${eq("bowtie") ? '<g><path d="M120 150 L98 140 L98 162 Z" fill="#d6456f"/><path d="M120 150 L142 140 L142 162 Z" fill="#d6456f"/><circle cx="120" cy="151" r="6" fill="#a82c50"/></g>' : ''}
    ${eq("hat") ? '<g><ellipse cx="120" cy="46" rx="52" ry="12" fill="#e3c06b"/><path d="M92 44 Q120 8 148 44 Q120 54 92 44Z" fill="#edd08a"/><path d="M94 40 Q120 46 146 40 L146 46 Q120 52 94 46Z" fill="#c46a3a"/></g>' : ''}
    ${eq("crown") ? '<g><path d="M96 44 L100 22 L112 36 L120 16 L128 36 L140 22 L144 44 Z" fill="#f2c341" stroke="#d9a520" stroke-width="2"/><circle cx="100" cy="22" r="4" fill="#e06a5a"/><circle cx="120" cy="16" r="4" fill="#4aa3d8"/><circle cx="140" cy="22" r="4" fill="#3fa06a"/></g>' : ''}
    ${eq("phones") ? '<g><path d="M70 78 Q70 24 120 24 Q170 24 170 78" stroke="#4a4440" stroke-width="9" fill="none"/><rect x="58" y="70" width="18" height="28" rx="8" fill="#4a4440"/><rect x="164" y="70" width="18" height="28" rx="8" fill="#4a4440"/></g>' : ''}
    ${eq("fish") ? '<g transform="translate(196 210)"><ellipse cx="0" cy="0" rx="20" ry="11" fill="#f2913d"/><path d="M16 0 L32 -10 L32 10 Z" fill="#f2913d"/><circle cx="-9" cy="-3" r="2.4" fill="#2d2118"/></g>' : ''}
  </svg>`;
}

/* ================= rendering ================= */
const $ = sel => document.querySelector(sel);
function fmt(n){ return n>=1000 ? n.toLocaleString("en-US") : String(n); }

function renderHeader(){
  $("#shellNum").textContent = fmt(state.shells);
  $("#streakNum").textContent = streak();
}
function speechLine(){
  const day = today(), pct = completionPct(day), h = new Date().getHours();
  if(pct>=100) return "Perfect day! You're otterly amazing! 🌟";
  if(pct>=80)  return "So close — one last push!";
  const missing = HABITS.filter(x=>!goalMet(day,x));
  if(missing.length && pct>=35){
    const m = missing[0];
    if(m.id==="water") return "A splash of water would be nice… 💧";
    if(m.id==="sleep") return "Did you log last night's sleep?";
    if(m.id==="exercise") return "Let's wiggle! A little movement counts.";
    if(m.id==="steps") return "Waddle a few more steps with me?";
    return "A calm minute for you = a happy otter.";
  }
  if(h<10) return "Morning! Let's make today a good one.";
  if(h<18) return "Small habits, big splashes!";
  return "Evening check-in — how did today go?";
}
function renderHome(){
  const day = today(), pct = completionPct(day);
  $("#nameTag").textContent = "🦦 " + state.otterName;
  const li = levelInfo();
  $("#lvlTag").textContent = "Lv "+li.lvl+" · "+li.title;
  $("#speech").textContent = speechLine();
  $("#otterWrap").innerHTML = otterSVG();
  // ring
  const r=30, c=2*Math.PI*r, off=c*(1-pct/100);
  $("#ringWrap").innerHTML =
    '<svg width="74" height="74" viewBox="0 0 74 74">'+
    '<circle cx="37" cy="37" r="'+r+'" fill="none" stroke="#efe9df" stroke-width="9"/>'+
    '<circle cx="37" cy="37" r="'+r+'" fill="none" stroke="#1f8a8a" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"/>'+
    '</svg><div class="pct">'+pct+'%</div>';
  const met = goalsMetCount(day);
  $("#todayHeadline").textContent = met===HABITS.length ? "Perfect day! 🌟" : "Today · "+met+"/"+HABITS.length+" goals";
  const nxt = li.next ? (li.next.xp-state.xp)+" XP to Lv "+(li.lvl+1) : "Max level!";
  $("#todaySub").textContent = "Each goal = "+REWARD_PER_GOAL+" 🐚 · perfect day +"+DAILY_BONUS+" · "+nxt;
  // quick log
  const q = $("#quickRow"); q.innerHTML = "";
  const quicks = [
    {label:"+1 cup 💧", fn:()=>bump("water",1)},
    {label:"+10 min 🏃", fn:()=>bump("exercise",10)},
    {label:"Mindful ✔ 🧘", fn:()=>{ today().mindful=1; afterChange(); }}
  ];
  for(const qk of quicks){
    const b=document.createElement("button");
    b.className="btn ghost"; b.style.flex="1"; b.textContent=qk.label;
    b.onclick=qk.fn; q.appendChild(b);
  }
}
function bump(id, amt){
  const day=today(), h=HABITS.find(x=>x.id===id);
  day[id]=Math.min(h.max||99999,(day[id]||0)+amt);
  afterChange();
}
function setVal(id, v){
  const day=today(), h=HABITS.find(x=>x.id===id);
  day[id]=Math.max(0,Math.min(h.max||99999, v));
  afterChange();
}
function afterChange(){ checkRewards(); renderAll(); }

function renderTrack(){
  $("#trackDate").textContent = new Date().toLocaleDateString("en-SG",{weekday:"long", day:"numeric", month:"short"});
  const day = today(), list = $("#habitList");
  list.innerHTML = "";
  for(const h of HABITS){
    const v = day[h.id]||0, done = goalMet(day,h);
    const card = document.createElement("div");
    card.className = "habit"+(done?" done":"");
    const pctBar = Math.min(100, Math.round(100*v/h.goal));
    let valTxt = h.type==="check" ? (v?"Done":"Not yet") : fmt(v)+(h.unit?" "+h.unit:"");
    let goalTxt = h.type==="check" ? "goal: once today" : "goal: "+fmt(h.goal)+" "+h.unit;
    let controls = "";
    card.innerHTML =
      '<div class="top">'+
        '<div class="emoji">'+h.emoji+'</div>'+
        '<div class="meta"><b>'+h.name+'</b><div class="sub">'+valTxt+' · '+goalTxt+'</div></div>'+
        (done?'<div class="done-badge">✔ done '+(day.rewarded[h.id]?"· 🐚":"")+'</div>':'')+
      '</div>'+
      '<div class="bar"><i style="width:'+pctBar+'%"></i></div>'+
      '<div class="controls" data-h="'+h.id+'"></div>';
    list.appendChild(card);
    const ctr = card.querySelector(".controls");
    if(h.type==="counter"){
      const minus=mkBtn("−"+h.step,"btn ghost small",()=>bump(h.id,-h.step));
      const plus=mkBtn("+"+h.step+(h.unit?" "+h.unit:""),"btn wide",()=>bump(h.id,h.step));
      ctr.append(minus, plus);
    } else if(h.type==="slider"){
      const s=document.createElement("input");
      s.type="range"; s.min=0; s.max=h.max; s.step=h.stepSize; s.value=v;
      const lab=document.createElement("b"); lab.style.cssText="min-width:52px;text-align:right;font-size:14px";
      lab.textContent=v+" h";
      s.oninput=()=>{ lab.textContent=s.value+" h"; };
      s.onchange=()=>setVal(h.id, parseFloat(s.value));
      ctr.append(s, lab);
    } else if(h.type==="input"){
      const inp=document.createElement("input");
      inp.type="number"; inp.min=0; inp.placeholder="e.g. 8000"; inp.value=v||"";
      inp.onchange=()=>setVal(h.id, parseInt(inp.value||"0",10)||0);
      const setb=mkBtn("Set","btn small",()=>setVal(h.id, parseInt(inp.value||"0",10)||0));
      ctr.append(inp, setb);
    } else { // check
      const b=mkBtn(v?"Undo":"Mark done ✔", v?"btn ghost wide":"btn wide", ()=>{ today().mindful=v?0:1; afterChange(); });
      ctr.append(b);
    }
  }
}
function mkBtn(txt, cls, fn){ const b=document.createElement("button"); b.className=cls; b.textContent=txt; b.onclick=fn; return b; }

function last7(){
  const out=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    out.push({key:dateKey(d), lab:d.toLocaleDateString("en-SG",{weekday:"narrow"}), day: state.days[dateKey(d)]||blankDay()});
  }
  return out;
}
function barChart(rows, h){
  const vals=rows.map(r=>r.day[h.id]||0);
  const maxV=Math.max(h.goal*1.25, ...vals) || 1;
  const W=340,H=110,bw=30,gap=(W-7*bw)/8;
  let s='<svg viewBox="0 0 '+W+' '+(H+22)+'" style="width:100%">';
  const gy=H-(h.goal/maxV)*H;
  s+='<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="#e8a33d" stroke-width="2" stroke-dasharray="5 5"/>';
  rows.forEach((r,i)=>{
    const v=r.day[h.id]||0, bh=Math.max(3,(v/maxV)*H), x=gap+i*(bw+gap), y=H-bh;
    const met=v>=h.goal, todayBar=r.key===todayKey();
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="7" fill="'+(met?"#3fa06a":"#9fcfcb")+'" opacity="'+(todayBar?1:.85)+'"/>';
    s+='<text x="'+(x+bw/2)+'" y="'+(H+16)+'" font-size="11" font-weight="'+(todayBar?800:600)+'" fill="'+(todayBar?"#136b6b":"#7a736a")+'" text-anchor="middle">'+r.lab+'</text>';
  });
  s+='</svg>';
  return s;
}
function renderStats(){
  const rows=last7();
  const avg=id=>{ const v=rows.map(r=>r.day[id]||0); return v.reduce((a,b)=>a+b,0)/v.length; };
  const activeDays=rows.filter(r=>goalsMetCount(r.day)>=STREAK_MIN_GOALS).length;
  const li=levelInfo();
  $("#kpis").innerHTML =
    '<div class="kpi"><b>'+streak()+'🔥</b><span>day streak</span></div>'+
    '<div class="kpi"><b>'+activeDays+'/7</b><span>active days</span></div>'+
    '<div class="kpi"><b>'+fmt(state.xp)+'</b><span>XP · Lv '+li.lvl+'</span></div>';
  $("#insightBox").innerHTML = "<b>🦦 Otter insight:</b> " + insight(rows);
  const charts=$("#charts"); charts.innerHTML="";
  for(const h of HABITS){
    if(h.type==="check"){
      const doneD=rows.filter(r=>(r.day[h.id]||0)>=1).length;
      const card=document.createElement("div"); card.className="stat-card";
      card.innerHTML='<h3>'+h.emoji+' '+h.name+'<small>'+doneD+'/7 days</small></h3>'+
        '<div style="display:flex;gap:8px;margin-top:10px">'+
        rows.map(r=>'<div style="flex:1;text-align:center"><div style="height:34px;border-radius:10px;background:'+((r.day[h.id]||0)>=1?"#3fa06a":"#efe9df")+'"></div><div style="font-size:11px;color:#7a736a;margin-top:4px">'+r.lab+'</div></div>').join("")+
        '</div>';
      charts.appendChild(card);
      continue;
    }
    const a=avg(h.id);
    const aTxt = h.id==="steps" ? fmt(Math.round(a)) : (Math.round(a*10)/10);
    const card=document.createElement("div"); card.className="stat-card";
    card.innerHTML='<h3>'+h.emoji+' '+h.name+'<small>avg '+aTxt+' '+h.unit+' · goal '+fmt(h.goal)+'</small></h3>'+barChart(rows,h);
    charts.appendChild(card);
  }
}
function insight(rows){
  const day=today();
  const msgs=[];
  const avg=id=>{ const v=rows.map(r=>r.day[id]||0); return v.reduce((a,b)=>a+b,0)/v.length; };
  const sleepA=avg("sleep"), waterA=avg("water"), exA=avg("exercise");
  if(sleepA<6.5) msgs.push("Sleep is averaging "+(Math.round(sleepA*10)/10)+"h — about "+(Math.round((7-sleepA)*10)/10)+"h under your goal. An earlier night tonight would make your otter snooze happy.");
  if(waterA<6) msgs.push("Hydration is running light ("+(Math.round(waterA*10)/10)+" cups/day avg). Try front-loading 2 cups in the morning.");
  if(exA>=30) msgs.push("Exercise is on point — "+Math.round(exA)+" min/day average. Keep the streak rolling!");
  if(!msgs.length){
    const met=goalsMetCount(day);
    msgs.push(met>=3 ? "Solid week overall. You're in a good rhythm — consistency beats intensity." :
      "Fresh week, fresh start. Hit any 3 goals today to keep your streak alive.");
  }
  return msgs[0];
}

function renderShop(){
  const grid=$("#shopGrid"); grid.innerHTML="";
  for(const it of SHOP){
    const owned=state.inventory.includes(it.id), eqd=state.equipped.includes(it.id);
    const card=document.createElement("div");
    card.className="item"+(owned?" owned":"");
    card.innerHTML='<div class="big">'+it.emoji+'</div><b>'+it.name+'</b>'+
      '<div class="price">'+(owned?(eqd?"Equipped":"Owned"):it.price+" 🐚")+'</div>'+
      (eqd?'<div class="equipped-dot">✅</div>':'');
    const btn=document.createElement("button");
    if(!owned){
      btn.className="btn wide"; btn.style.width="100%";
      btn.textContent="Buy";
      btn.disabled = state.shells < it.price;
      btn.onclick=()=>{
        state.shells-=it.price; state.inventory.push(it.id); state.equipped.push(it.id);
        toast(it.emoji+" "+it.name+" unlocked!"); celebrate(); save(); renderAll();
      };
    } else {
      btn.className="btn ghost wide"; btn.style.width="100%";
      btn.textContent=eqd?"Take off":"Wear";
      btn.onclick=()=>{
        if(eqd) state.equipped=state.equipped.filter(x=>x!==it.id);
        else state.equipped.push(it.id);
        save(); renderAll();
      };
    }
    card.appendChild(btn);
    grid.appendChild(card);
  }
}

function renderAll(){
  renderHeader(); renderHome(); renderTrack(); renderStats(); renderShop();
}

/* ================= fx ================= */
let toastT=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"), 2200);
}
function floatShells(txt){
  const f=document.createElement("div");
  f.className="floater"; f.textContent=txt;
  f.style.left=(40+Math.random()*40)+"%"; f.style.top="42%";
  $("#app").appendChild(f);
  setTimeout(()=>f.remove(),1200);
}
function celebrate(){
  const w=$("#otterWrap"); if(!w) return;
  w.classList.remove("celebrate"); void w.offsetWidth; w.classList.add("celebrate");
}

/* ================= nav & settings ================= */
document.getElementById("nav").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+b.dataset.view).classList.add("active");
  document.getElementById("main").scrollTop=0;
});
function rename(){
  const n=prompt("Name your otter:", state.otterName);
  if(n && n.trim()){ state.otterName=n.trim().slice(0,14); save(); renderAll(); }
}
document.getElementById("nameTag").addEventListener("click", rename);
document.getElementById("renameBtn").addEventListener("click", rename);
document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Reset all OtterLife data? (Includes demo history)")){
    state=defaultState(); state.days={}; save(); renderAll();
    toast("Fresh start! 🦦");
  }
});

/* ================= boot ================= */
checkRewards();
renderAll();
</script>
</body>
